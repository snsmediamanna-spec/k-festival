<style>
  :root{--bg:#f0ede6;--card-bg:#fff;--text:#1a1a1a;--text-mid:#555;--text-light:#888;--border:#ddd8ce;--primary:#c0392b;--gold:#c8922a;--radius:12px;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);}
  .page-header{padding:36px 40px 0;max-width:1200px;margin:0 auto;}
  .page-header h1{font-size:2rem;font-weight:700;margin-bottom:6px;}
  .page-header p{font-size:0.88rem;color:var(--text-mid);}
  .filters{max-width:1200px;margin:20px auto 0;padding:0 40px;display:flex;flex-direction:column;gap:10px;}
  .filter-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .filter-label{font-size:0.75rem;color:var(--text-light);min-width:36px;flex-shrink:0;}
  .fbtn{padding:5px 14px;border-radius:20px;border:1.5px solid var(--border);background:transparent;font-size:0.75rem;font-family:'Noto Sans KR',sans-serif;cursor:pointer;color:var(--text-mid);transition:all .15s;}
  .fbtn:hover{border-color:var(--primary);color:var(--primary);}
  .fbtn.active{background:var(--primary);border-color:var(--primary);color:#fff;font-weight:700;}
  .search-row{display:flex;align-items:center;gap:8px;}
  .search-input{flex:1;max-width:340px;padding:7px 14px;border:1.5px solid var(--border);border-radius:20px;font-size:0.82rem;font-family:'Noto Sans KR',sans-serif;outline:none;background:#fff;}
  .search-input:focus{border-color:var(--primary);}
  .section-header{max-width:1200px;margin:24px auto 14px;padding:0 40px;display:flex;align-items:center;gap:10px;}
  .section-title{font-size:1.15rem;font-weight:700;}
  .section-count{font-size:0.8rem;color:var(--text-light);}
  .card-grid{max-width:1200px;margin:0 auto;padding:0 40px 60px;display:grid;grid-template-columns:repeat(5,1fr);gap:14px;}
  .card{border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:transform .2s,box-shadow .2s;background:var(--card-bg);position:relative;}
  .card:hover{transform:translateY(-5px);box-shadow:0 10px 30px rgba(0,0,0,.15);}
  .card-thumb{width:100%;aspect-ratio:3/4;overflow:hidden;position:relative;}
  .card-thumb img{width:100%;height:100%;object-fit:cover;transition:transform .3s;}
  .card:hover .card-thumb img{transform:scale(1.05);}
  .no-img{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:0.78rem;color:rgba(255,255,255,.9);font-weight:700;text-align:center;padding:12px;line-height:1.5;}
  .card-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.75) 0%,rgba(0,0,0,.1) 55%,transparent 100%);}
  .card-text{position:absolute;bottom:0;left:0;right:0;padding:10px;}
  .card-name{font-size:0.82rem;font-weight:700;color:#fff;line-height:1.35;margin-bottom:5px;}
  .card-date{font-size:0.62rem;color:rgba(255,255,255,.85);margin-bottom:2px;}
  .card-loc{font-size:0.62rem;color:rgba(255,255,255,.7);}
  .badge{position:absolute;font-size:0.58rem;font-weight:700;padding:2px 6px;border-radius:4px;z-index:2;}
  .badge-region{top:8px;left:8px;background:rgba(0,0,0,.55);color:#fff;}
  .badge-new{top:8px;right:8px;background:var(--primary);color:#fff;}
  .card-link{text-decoration:none;}
  .empty{text-align:center;padding:80px 20px;color:var(--text-light);grid-column:1/-1;font-size:.9rem;}
  @media(max-width:1100px){.card-grid{grid-template-columns:repeat(4,1fr);}}
  @media(max-width:860px){.card-grid{grid-template-columns:repeat(3,1fr);}}
  @media(max-width:600px){.card-grid{grid-template-columns:repeat(2,1fr);padding:0 14px 40px;}.page-header,.filters,.section-header{padding-left:14px;padding-right:14px;}.page-header h1{font-size:1.4rem;}}
</style>
</head>

const REGIONS=["전체","서울","경기","인천","강원","충청","전라","경상","부산","제주"];
let selRegion="전체",selMonth=0;

function getMonthKey(f){const d=f.startDate.match(/(\d{4})-(\d{2})/);return d?parseInt(d[1])*100+parseInt(d[2]):0;}

function buildFilters(){
  document.getElementById('regionFilter').innerHTML=REGIONS.map(r=>
    `<button class="fbtn${selRegion===r?' active':''}" onclick="selRegion='${r}';buildFilters();render()">${r}</button>`
  ).join(' ');
  const months=[...new Set(FESTIVALS.map(f=>getMonthKey(f)).filter(Boolean))].sort((a,b)=>b-a);
  document.getElementById('monthFilter').innerHTML=
    `<button class="fbtn${selMonth===0?' active':''}" onclick="selMonth=0;buildFilters();render()">전체</button>`+
    months.map(mk=>{const y=Math.floor(mk/100),m=mk%100;return`<button class="fbtn${selMonth===mk?' active':''}" onclick="selMonth=${mk};buildFilters();render()">${y}.${String(m).padStart(2,'0')}</button>`;}).join('');
}

function render(){
  const q=document.getElementById('searchInput').value.trim();
  const filtered=FESTIVALS.filter(f=>{
    if(selRegion!=="전체"&&f.region!==selRegion)return false;
    if(selMonth!==0&&getMonthKey(f)!==selMonth)return false;
    if(q&&!f.title.includes(q)&&!f.loc.includes(q))return false;
    return true;
  });
  const y=Math.floor(selMonth/100),m=selMonth%100;
  document.getElementById('sectionTitle').textContent=selMonth?`🗓️ ${y}년 ${m}월 ${selRegion!=='전체'?selRegion+' ':''}축제`:selRegion!=='전체'?`📍 ${selRegion} 축제`:'🗓️ 전체 축제';
  document.getElementById('sectionCount').textContent=`총 ${filtered.length}건`;
  const grid=document.getElementById('cardGrid');
  if(!filtered.length){grid.innerHTML='<div class="empty">해당 조건의 축제 정보가 없습니다.</div>';return;}
  grid.innerHTML=filtered.map((f,i)=>`
    <a class="card card-link" href="${f.url}" target="_blank" rel="noopener">
      <div class="card-thumb">
        <img src="${ASSET_BASE}${f.poster}" alt="${f.title}" loading="lazy" onerror="this.style.display='none';this.parentNode.querySelector('.no-img').style.display='flex'">
        <div class="no-img" style="background:${pal(i)};display:none">${f.title}</div>
        <div class="card-overlay"></div>
        <span class="badge badge-region">${f.region}</span>
        <div class="card-text">
          <div class="card-name">${f.title}</div>
          <div class="card-date">🗓 ${f.date}</div>
          <div class="card-loc">📍 ${f.loc}</div>
        </div>
      </div>
    </a>`).join('');
}

// admin.html에서 등록한 축제 불러오기
function loadAdminFestivals(){
  try{
    const saved=localStorage.getItem('admin_festivals');
    if(saved){
      const arr=JSON.parse(saved);
      arr.forEach(f=>{if(!FESTIVALS.find(x=>x.id===f.id)){FESTIVALS.unshift(f);}});
    }
  }catch(e){}
}

loadAdminFestivals();
buildFilters();
render();

window.addEventListener('message',e=>{
  if(e.data&&e.data.type==='ADD_FESTIVAL'){FESTIVALS.unshift(e.data.festival);buildFilters();render();}
});
</script>
