<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>학회 소식 | (사)마이스홍보교육학회</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #3d3dc8;
    --bg: #ffffff;
    --text: #1a1a1a;
    --text-mid: #444;
    --text-light: #999;
    --border: #e8e8e8;
    --heart: #e0e0e0;
    --heart-active: #e05555;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); }

  .all-posts-bar { padding: 20px 40px 0; border-bottom: 1px solid var(--border); max-width: 900px; margin: 0 auto; }
  .all-posts-link { display: inline-block; font-size: 0.88rem; font-weight: 500; color: var(--primary); text-decoration: none; padding-bottom: 12px; border-bottom: 2px solid var(--primary); }

  .cat-tabs { padding: 0 40px; display: flex; gap: 0; border-bottom: 1px solid var(--border); max-width: 900px; margin: 0 auto; }
  .cat-tab { padding: 14px 18px 12px; font-size: 0.82rem; font-weight: 500; color: var(--text-light); cursor: pointer; border-bottom: 2px solid transparent; background: none; border-top: none; border-left: none; border-right: none; font-family: 'Noto Sans KR', sans-serif; transition: all 0.15s; white-space: nowrap; }
  .cat-tab:hover { color: var(--text); }
  .cat-tab.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 700; }

  .post-list { max-width: 900px; margin: 0 auto; padding: 0 40px 80px; }
  .post-item { display: flex; border-bottom: 1px solid var(--border); padding: 40px 0; cursor: pointer; transition: opacity 0.15s; text-decoration: none; color: inherit; }
  .post-item:hover { opacity: 0.82; }
  .post-item:first-child { padding-top: 36px; }

  .post-thumb { width: 240px; min-width: 240px; height: 180px; border-radius: 2px; overflow: hidden; background: #f0f0f5; margin-right: 28px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; color: #aaa; }
  .post-thumb img { width: 100%; height: 100%; object-fit: cover; }

  .post-info { flex: 1; display: flex; flex-direction: column; }
  .post-meta-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .post-avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 0.6rem; color: #fff; font-weight: 700; flex-shrink: 0; }
  .post-author { font-size: 0.78rem; font-weight: 500; color: var(--text-mid); }
  .post-date-read { font-size: 0.75rem; color: var(--text-light); }
  .post-dot { color: var(--text-light); font-size: 0.7rem; }
  .post-more-btn { margin-left: auto; background: none; border: none; cursor: pointer; color: var(--text-light); font-size: 1.1rem; padding: 2px 6px; border-radius: 4px; }

  .post-title { font-size: 1.05rem; font-weight: 700; color: var(--text); margin-bottom: 10px; line-height: 1.4; }
  .post-excerpt { font-size: 0.82rem; color: var(--text-mid); line-height: 1.7; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; flex: 1; }

  .post-footer { display: flex; align-items: center; gap: 16px; margin-top: 14px; }
  .post-stats { font-size: 0.75rem; color: var(--text-light); }
  .post-cat-badge { font-size: 0.68rem; font-weight: 700; padding: 2px 8px; border-radius: 3px; color: #fff; letter-spacing: 0.04em; }
  .post-heart { margin-left: auto; background: none; border: none; cursor: pointer; color: var(--heart); font-size: 1.1rem; transition: color 0.15s; padding: 0; }
  .post-heart.liked { color: var(--heart-active); }

  .pagination { display: flex; justify-content: center; gap: 4px; padding: 32px 40px 60px; }
  .page-btn { min-width: 36px; height: 36px; padding: 0 8px; border-radius: 4px; border: 1px solid var(--border); background: transparent; font-size: 0.82rem; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; color: var(--text-mid); transition: all 0.15s; }
  .page-btn:hover { border-color: var(--primary); color: var(--primary); }
  .page-btn.active { background: var(--primary); border-color: var(--primary); color: #fff; font-weight: 700; }

  @media (max-width: 700px) {
    .all-posts-bar, .cat-tabs { padding-left: 16px; padding-right: 16px; }
    .post-list { padding: 0 16px 60px; }
    .post-thumb { width: 110px; min-width: 110px; height: 90px; margin-right: 14px; }
    .post-title { font-size: 0.88rem; }
    .cat-tabs { overflow-x: auto; }
  }
</style>

const PER = 5;
let curCat = 'all', curPage = 1, filtered = [...POSTS];
const liked = new Set();

function getFiltered(cat) { return cat === 'all' ? [...POSTS] : POSTS.filter(p => p.cat === cat); }

function render() {
  filtered = getFiltered(curCat);
  const list = document.getElementById('postList');
  const slice = filtered.slice((curPage-1)*PER, curPage*PER);
  const icons = {festival:'🏮', publish:'📖', report:'📋', history:'🏛'};
  list.innerHTML = slice.map(p => {
    const cfg = CAT[p.cat];
    const thumbHtml = p.thumb ? `<img src="${p.thumb}" alt="${p.title}" loading="lazy">` : `<span>${icons[p.cat]}</span>`;
    return `
    <a class="post-item" href="post.html?id=${p.id}" target="_blank">
      <div class="post-thumb">${thumbHtml}</div>
      <div class="post-info">
        <div class="post-meta-top">
          <div class="post-avatar">sn</div>
          <span class="post-author">snsmedia</span>
          <span class="post-dot">·</span>
          <span class="post-date-read">${p.date} · ${p.read}</span>
          <button class="post-more-btn" onclick="event.preventDefault();event.stopPropagation()">⋯</button>
        </div>
        <div class="post-title">${p.title}</div>
        <div class="post-excerpt">${p.excerpt}</div>
        <div class="post-footer">
          <span class="post-stats">조회수 ${p.views}회 · 댓글 ${p.comments}개</span>
          <span class="post-cat-badge" style="background:${cfg.color}">${cfg.label}</span>
          <button class="post-heart${liked.has(p.id)?' liked':''}" onclick="event.preventDefault();event.stopPropagation();toggleHeart(${p.id},this)">♥</button>
        </div>
      </div>
    </a>`;
  }).join('');
  renderPagination();
}

function renderPagination() {
  const total = Math.ceil(filtered.length / PER);
  const pg = document.getElementById('pagination');
  if (total <= 1) { pg.innerHTML = ''; return; }
  let h = '';
  if (curPage > 1) h += `<button class="page-btn" onclick="goPage(${curPage-1})">‹</button>`;
  for (let i = 1; i <= total; i++) h += `<button class="page-btn${i===curPage?' active':''}" onclick="goPage(${i})">${i}</button>`;
  if (curPage < total) h += `<button class="page-btn" onclick="goPage(${curPage+1})">›</button>`;
  pg.innerHTML = h;
}

function goPage(n) { curPage = n; render(); window.scrollTo({top:0,behavior:'smooth'}); }
function filterPosts(cat, btn) {
  curCat = cat; curPage = 1;
  document.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  render();
}
function toggleHeart(id, btn) {
  if (liked.has(id)) { liked.delete(id); btn.classList.remove('liked'); }
  else { liked.add(id); btn.classList.add('liked'); }
}
render();
</script>
