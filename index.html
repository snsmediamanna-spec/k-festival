<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>월간 K-FESTIVAL</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Noto+Serif+KR:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0ede6;
    --text: #1a1a1a;
    --text-mid: #555;
    --text-light: #999;
    --red: #c0392b;
    --gold: #c8922a;
    --border: #ddd8ce;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

  /* ── 슬라이더 전체 래퍼 ── */
  .slider-section { position: relative; width: 100%; background: var(--bg); padding: 0; overflow: hidden; }

  .slider-track { display: flex; transition: transform 0.5s cubic-bezier(.4,0,.2,1); will-change: transform; }

  .slide {
    min-width: 100%; position: relative;
    height: 560px; overflow: hidden;
    display: flex; align-items: flex-end;
  }

  .slide-bg {
    position: absolute; inset: 0;
    background-size: cover; background-position: center;
    transition: transform 6s ease;
  }
  .slide.active .slide-bg { transform: scale(1.04); }

  .slide-spine {
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 52px;
    background: rgba(0,0,0,0.45);
    display: flex; align-items: center; justify-content: center;
    writing-mode: vertical-rl;
    font-size: 0.72rem; font-weight: 700; letter-spacing: 0.18em;
    color: rgba(255,255,255,0.85);
    z-index: 4;
  }

  .slide-badge {
    position: absolute; left: 60px; top: 24px;
    background: #fff; border-radius: 10px;
    padding: 8px; z-index: 5;
    text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,0.18);
  }
  .slide-badge img { display: block; }

  .slide-tag {
    position: absolute; top: 28px; right: 28px;
    background: rgba(0,0,0,0.55); color: #fff;
    padding: 4px 12px; border-radius: 20px;
    font-size: 0.72rem; font-weight: 500;
    z-index: 5; backdrop-filter: blur(4px);
  }

  .slide-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, rgba(0,0,0,0.15) 55%, transparent 100%);
    z-index: 3;
  }

  .slide-content {
    position: relative; z-index: 5;
    padding: 0 32px 32px 68px;
    width: 100%;
  }
  .slide-vol { font-size: 0.72rem; font-weight: 500; color: rgba(255,255,255,0.7); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 8px; }
  .slide-title { font-size: 2rem; font-weight: 900; color: #fff; line-height: 1.25; letter-spacing: -0.02em; margin-bottom: 10px; }
  .slide-desc { font-size: 0.82rem; color: rgba(255,255,255,0.8); line-height: 1.65; max-width: 560px; }

  /* 슬라이드 내 표지 미리보기 (우측 하단) */
  .slide-cover-preview {
    position: absolute; bottom: 32px; right: 130px; z-index: 5;
    width: 80px; height: 107px;
    border-radius: 4px; overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.3);
  }
  .slide-cover-preview img {
    width: 100%; height: 100%; object-fit: cover;
  }

  .slide-btn {
    position: absolute; bottom: 32px; right: 32px; z-index: 5;
    background: rgba(255,255,255,0.18); border: 1.5px solid rgba(255,255,255,0.5);
    color: #fff; padding: 10px 18px; border-radius: 8px;
    font-size: 0.8rem; font-weight: 600; font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer; backdrop-filter: blur(6px);
    text-decoration: none; display: flex; align-items: center; gap: 6px;
    transition: background 0.2s;
  }
  .slide-btn:hover { background: rgba(255,255,255,0.3); }

  .arrow {
    position: absolute; top: 50%; transform: translateY(-50%);
    z-index: 10; background: rgba(255,255,255,0.2); border: none;
    width: 40px; height: 40px; border-radius: 50%; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(6px); transition: background 0.2s;
    color: #fff; font-size: 1.1rem;
  }
  .arrow:hover { background: rgba(255,255,255,0.38); }
  .arrow-prev { left: 16px; }
  .arrow-next { right: 16px; }

  .indicators {
    position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 6px; z-index: 10;
  }
  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: rgba(255,255,255,0.4); border: none; cursor: pointer;
    padding: 0; transition: background 0.2s, transform 0.2s;
  }
  .dot.active { background: #fff; transform: scale(1.25); }

  /* ── 아카이브 섹션 ── */
  .archive { padding: 40px 32px 60px; max-width: 1100px; margin: 0 auto; }
  .archive-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
  .archive-title { font-size: 1.15rem; font-weight: 700; color: var(--text); }
  .year-tabs { display: flex; gap: 6px; }
  .year-tab {
    padding: 5px 14px; border-radius: 20px;
    border: 1.5px solid var(--border); background: transparent;
    font-size: 0.78rem; font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer; color: var(--text-mid); transition: all 0.15s;
  }
  .year-tab.active { background: var(--text); color: #fff; border-color: var(--text); }

  .archive-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 14px;
  }
  .archive-card {
    cursor: pointer; border-radius: 8px; overflow: hidden;
    border: 2px solid transparent;
    transition: transform 0.18s, border-color 0.18s, box-shadow 0.18s;
    background: #fff;
  }
  .archive-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
  .archive-card.current { border-color: var(--red); }
  .archive-thumb {
    width: 100%; aspect-ratio: 3/4;
    background: #e8e0d4; overflow: hidden; position: relative;
  }
  .archive-thumb img {
    width: 100%; height: 100%; object-fit: cover;
    transition: opacity 0.3s;
  }
  .archive-thumb img.loading { opacity: 0; }
  .archive-thumb img.loaded { opacity: 1; }
  .archive-thumb .no-img {
    width: 100%; height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-size: 1.8rem; color: rgba(255,255,255,0.7);
    text-align: center; padding: 8px;
  }
  .archive-thumb .no-img span {
    font-size: 0.62rem; font-weight: 700; color: rgba(255,255,255,0.85);
    margin-top: 6px; letter-spacing: 0.05em;
  }
  .archive-info { padding: 8px 10px 10px; }
  .archive-vol { font-size: 0.62rem; color: var(--text-light); font-weight: 500; }
  .archive-month { font-size: 0.78rem; font-weight: 700; color: var(--text); margin-top: 2px; }
  .current-badge {
    position: absolute; top: 6px; right: 6px;
    background: var(--red); color: #fff;
    font-size: 0.58rem; font-weight: 700;
    padding: 2px 6px; border-radius: 4px;
    z-index: 2;
  }

  @media (max-width: 768px) {
    .slide { height: 440px; }
    .slide-title { font-size: 1.4rem; }
    .archive-grid { grid-template-columns: repeat(3, 1fr); }
    .slide-badge { display: none; }
    .slide-cover-preview { display: none; }
  }
  @media (max-width: 480px) {
    .slide { height: 360px; }
    .archive-grid { grid-template-columns: repeat(2, 1fr); }
    .archive { padding: 24px 16px 40px; }
  }
</style>

});

// ─── 슬라이더 ───
let cur = 0;
let timer = null;

function buildSlider() {
  const track = document.getElementById('sliderTrack');
  const dots = document.getElementById('indicators');
  const recent = ISSUES.slice(0, 5);

  track.innerHTML = recent.map((issue, i) => {
    const thumbUrl = issue.thumb;
    const bgStyle = thumbUrl
      ? `background-image:url('${thumbUrl}'); background-size:cover; background-position:center;`
      : `background:${issue.bgColor}`;

    const coverPreviewHTML = thumbUrl
      ? `<div class="slide-cover-preview">
           <img src="${thumbUrl}" alt="${issue.label}" loading="lazy"
                onerror="this.parentElement.style.display='none'">
         </div>`
      : '';

    return `
    <div class="slide${i===0?' active':''}" id="slide${i}">
      <div class="slide-bg" style="${bgStyle}"></div>
      <div class="slide-overlay"></div>
      <div class="slide-spine" style="background:${issue.spineColor||'rgba(0,0,0,0.5)'}">
        ${issue.year}.${String(issue.month).padStart(2,'0')} Vol.${issue.vol}
      </div>
      ${issue.tag ? `<div class="slide-tag">${issue.tag}</div>` : ''}
      <div class="slide-content">
        <div class="slide-vol">${issue.subtitle}</div>
        <div class="slide-title">월간 K-FESTIVAL<br>${issue.label}</div>
        <div class="slide-desc">${issue.desc}</div>
      </div>
      ${coverPreviewHTML}
      <a class="slide-btn" href="${issue.url}" target="_blank">K-FESTIVAL 보기 ↗</a>
    </div>`;
  }).join('');

  dots.innerHTML = recent.map((_, i) =>
    `<button class="dot${i===0?' active':''}" onclick="goSlide(${i})"></button>`
  ).join('');

  startTimer();
}

function goSlide(n) {
  const slides = document.querySelectorAll('.slide');
  const dotsEl = document.querySelectorAll('.dot');
  slides[cur].classList.remove('active');
  dotsEl[cur].classList.remove('active');
  cur = (n + slides.length) % slides.length;
  document.getElementById('sliderTrack').style.transform = `translateX(-${cur * 100}%)`;
  slides[cur].classList.add('active');
  dotsEl[cur].classList.add('active');
}
function nextSlide() { goSlide(cur + 1); resetTimer(); }
function prevSlide() { goSlide(cur - 1); resetTimer(); }
function startTimer() { timer = setInterval(() => goSlide(cur + 1), 5000); }
function resetTimer() { clearInterval(timer); startTimer(); }

// ─── 아카이브 ───
function buildArchive(filterYear) {
  const years = [...new Set(ISSUES.map(i => i.year))].sort((a,b) => b-a);
  const tabsEl = document.getElementById('yearTabs');
  tabsEl.innerHTML = ['전체', ...years].map(y =>
    `<button class="year-tab${(filterYear===y||(!filterYear&&y==='전체'))?' active':''}"
      onclick="buildArchive(${y==='전체'?'null':y})">${y}</button>`
  ).join('');

  const filtered = filterYear ? ISSUES.filter(i => i.year === filterYear) : ISSUES;
  const latest = ISSUES[0];

  document.getElementById('archiveGrid').innerHTML = filtered.map(issue => {
    const thumbUrl = issue.thumb;
    let thumbHTML;
    if (thumbUrl) {
      thumbHTML = `<img
        src="${thumbUrl}"
        alt="${issue.label}"
        loading="lazy"
        class="loading"
        onload="this.classList.remove('loading');this.classList.add('loaded')"
        onerror="this.parentElement.innerHTML=fallbackThumb('${issue.bgColor}','${issue.label}')"
      >`;
    } else {
      thumbHTML = fallbackThumb(issue.bgColor, issue.label);
    }

    return `
    <div class="archive-card${issue.vol===latest.vol?' current':''}"
         onclick="window.open('${issue.url}','_blank')">
      <div class="archive-thumb">
        ${thumbHTML}
        ${issue.vol===latest.vol ? '<span class="current-badge">최신호</span>' : ''}
      </div>
      <div class="archive-info">
        <div class="archive-vol">VOL.${issue.vol}</div>
        <div class="archive-month">${issue.label}</div>
      </div>
    </div>`;
  }).join('');
}

function fallbackThumb(bgColor, label) {
  const monthLabel = label.replace('년 ','').replace('호','');
  return `<div class="no-img" style="background:${bgColor}">
    📚<span>${monthLabel}</span>
  </div>`;
}

// admin.html에서 실시간 postMessage 수신
window.addEventListener('message', e => {
  if (e.data && e.data.type === 'ADD_MAGAZINE') {
    const m = e.data.magazine;
    if (!ISSUES.find(x => x.vol === m.vol)) {
      const newIssue = {
        vol: m.vol, year: m.year, month: m.month,
        label: m.label, subtitle: m.subtitle,
        theme: m.theme, tag: m.tag, desc: m.desc,
        moazineIssueId: m.moazineIssueId || null,
        bgColor: m.bgColor,
        spineColor: 'rgba(0,0,0,0.5)',
        url: m.url
      };
      newIssue.thumb = moazineThumb(newIssue.moazineIssueId);
      ISSUES.unshift(newIssue);
    }
    buildSlider();
    buildArchive(null);
  }
});

buildSlider();
buildArchive(null);
</script>
